name: Test

on:
  push:
    branches:
      - 'master'
      - 'dev*'
  pull_request:
  schedule:
    - cron: "0 23 * * 0-4"   # 08:00 JST, Monday to Friday

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - redmine-repository: 'redmica/redmica'
            redmine-version: 'stable-4.1'
            ruby-version: '3.4'
          - redmine-repository: 'redmine/redmine'
            redmine-version: 'master'
            ruby-version: '3.4'

    steps:
    - uses: hidakatsuya/action-setup-redmine@v3.0.1
      with:
        repository: ${{ matrix.redmine-repository }}
        version: ${{ matrix.redmine-version }}
        ruby-version: ${{ matrix.ruby-version }}
        database: 'postgres:14'

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: plugins/redmine_message_customize

    - name: Set up plugin
      run: bundle install

    - name: Run tests
      run: bin/rails redmine:plugins:test NAME=redmine_message_customize
